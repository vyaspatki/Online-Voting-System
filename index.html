<!DOCTYPE html>
<html>
<head>
<title>Online Voting System</title>
<style>
* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: Arial, sans-serif;
	font-size: 16px;
	line-height: 1.5;
}

nav {
	background-color: #333;
	color: #fff;
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 10px;
}

nav ul {
	list-style: none;
	margin: 0;
	padding: 0;
	display: flex;
}

nav ul li {
	margin-right: 20px;
}

nav ul li:last-child {
	margin-right: 0;
}

nav a {
	color: #fff;
	text-decoration: none;
	font-weight: bold;
}

nav a:hover {
	color: #ccc;
}

nav li {
	color: #0e0000;
}

h1 {
	text-align: center;
	margin-top: 50px;
}

p {
	text-align: center;
	font-size: 18px;
}

li {
	display: block;
	margin-bottom: 10px;
	font-weight: bold;
	color: #333;
	text-transform: uppercase;
	font-size: 15px;
	text-align: left;
}

h3 {
	display: block;
	margin-bottom: 10px;
	font-weight: bold;
	color: #fff;
	text-transform: uppercase;
	font-size: 20px;
	text-align: left;
}
</style>
</head>
<body>
	<nav>
		<h3>Online Voting System</h3>
		<ul>
		<li><a href="index.html">Home</a></li>
			<li><a href="Login.jsp">Admin</a></li>
			<li><a href="student_council.jsp">Election</a></li>
			<li><a href="candidate_list.jsp">Candidates</a></li>
			<li><a href="view_elections.jsp">Elections</a></li>
		</ul>
	</nav>
	<div class="hero">
		<img class="hero-img" src="student-voting-guide-hero-02.png?v=10" alt="Welcome">
		<h1>Welcome</h1>
	</div>

	<style>
	.hero {
		width: 100%;
		height: auto;
		aspect-ratio: 16 / 9;
		background-image: url('student-voting-guide-hero-02.png?v=10');
		background-size: cover;
		background-position: center center;
		background-repeat: no-repeat;
		background-color: #E63946;
		display: flex;
		align-items: center;
		justify-content: flex-start;
		position: relative;
		margin: 0;
		padding-left: 80px;
		overflow: hidden;
	}

	.hero img.hero-img {
		position: absolute;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		object-fit: cover;
		z-index: 0;
	}

	.hero h1 {
		position: relative;
		color: white;
		font-size: 64px;
		text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
		margin: 0;
		text-align: left;
		z-index: 1;
		padding-left: 40px;
	}

	@media (max-width: 600px) {
		.hero { height: 40vh; padding-left: 20px; }
		.hero h1 { font-size: 32px; }
	}
	</style>

</body>
</html>
