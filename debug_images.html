<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Debug Images</title>
  <style>body{font-family:Arial;padding:20px} img{max-width:45%;margin:10px;border:1px solid #ccc}</style>
</head>
<body>
  <h2>Image Debug</h2>
  <p>This page loads the two candidate files and reports their load status and natural size.</p>

  <div>
    <h3>welcome.jpg (repo root)</h3>
    <img id="imgWelcome" src="/Online-Voting-System-master/welcome.jpg?v=5" alt="welcome.jpg">
    <div id="infoWelcome">Loading...</div>
  </div>

  <div>
    <h3>vote.jpg (deployed)</h3>
    <img id="imgVote" src="/Online-Voting-System-master/vote.jpg?v=1" alt="vote.jpg">
    <div id="infoVote">Loading...</div>
  </div>

<script>
function setInfo(id, text) { document.getElementById(id).innerText = text; }

function inspect(imgId, infoId) {
  const img = document.getElementById(imgId);
  img.onload = function() {
    setInfo(infoId, 'Loaded OK — natural size: ' + img.naturalWidth + 'x' + img.naturalHeight);
  }
  img.onerror = function(e) {
    setInfo(infoId, 'Error loading image (HTTP or not found).');
  }
}
inspect('imgWelcome','infoWelcome');
inspect('imgVote','infoVote');
</script>
</body>
</html>
