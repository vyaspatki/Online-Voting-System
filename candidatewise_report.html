<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Wise Report</title>
<style>
* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: Arial, sans-serif;
	font-size: 16px;
	line-height: 1.5;
}

.navbar {
	background-color: #333;
	overflow: hidden;
}

.navbar a {
	float: left;
	cursor: pointer;
	display: block;
	color: #f2f2f2;
	text-align: center;
	padding: 14px 16px;
	text-decoration: none;
}

.navbar a:hover {
	background-color: #ddd;
	color: black;
}

@media screen and (max-width: 600px) {
	.navbar a {
		float: none;
		width: 100%;
	}
}

.search-form {
	display: flex;
	flex-direction: row;
	justify-content: center;
	align-items: center;
	margin: 20px;
}

label {
	font-weight: bold;
	margin-right: 10px;
}

input[type="text"] {
	padding: 5px;
	border: 1px solid #ccc;
	border-radius: 5px;
	margin-right: 10px;
}

input[type="submit"] {
	padding: 5px 10px;
	background-color: #4CAF50;
	color: white;
	border: none;
	border-radius: 5px;
	cursor: pointer;
}

input[type="submit"]:hover {
	background-color: #3e8e41;
}
</style>
</head>
<body>
		<nav style="background:#222;color:#fff;padding:10px;display:flex;align-items:center;justify-content:space-between;">
			<div style="display:flex;align-items:center;gap:12px;">
				<img src="vote.jpg" alt="Vote" style="height:40px;"> 
				<strong style="font-size:18px;">Online Voting System</strong>
			</div>
			<div>
				<a href="index.html" style="color:#fff;margin-right:12px;text-decoration:none;">Home</a>
				<a href="Login.jsp" style="color:#fff;margin-right:12px;text-decoration:none;">Login</a>
				<a href="register.jsp" style="color:#fff;text-decoration:none;">Register</a>
			</div>
		</nav>
	<form class="search-form" action="candidatewise_report.jsp"
		method="post">
		<label for="cno">Candidate ID</label> <input type="text" id="cno"
			name="cid" required> <input type="submit" value="Submit">
	</form>

	<footer style="background:#f4f4f4;padding:12px;text-align:center;margin-top:24px;">
	  <div style="max-width:960px;margin:0 auto;color:#333;">
	    <small>&copy; 2026 Online Voting System</small>
	  </div>
	</footer>

</body>
</html>
